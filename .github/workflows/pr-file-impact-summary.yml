name: PR file impact summary

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - edited

permissions:
  contents: read
  pull-requests: write

jobs:
  update-pr-body:
    name: Update PR body
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Update changed file summary
        uses: actions/github-script@v7
        env:
          MAX_SUMMARY_FILES: "300"
        with:
          script: |
            const { renderUpdatedPrBody } = await import(`${process.env.GITHUB_WORKSPACE}/.github/scripts/render-pr-file-impact-summary.mjs`);

            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const currentBody = context.payload.pull_request.body ?? "";
            const maxFiles = Number.parseInt(process.env.MAX_SUMMARY_FILES ?? "300", 10);
            const body = renderUpdatedPrBody({
              body: currentBody,
              files,
              maxFiles: Number.isFinite(maxFiles) ? maxFiles : 300,
            });

            if (body === currentBody) {
              core.info("PR body is already up to date.");
              return;
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number,
              body,
            });
