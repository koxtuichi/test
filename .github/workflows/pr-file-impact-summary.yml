name: PR file impact summary

on:
  pull_request_target:
    branches:
      - develop
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - converted_to_draft

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  update-pr-body:
    name: Update PR body
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Update changed file summary
        uses: actions/github-script@v9
        with:
          script: |
            // PR本文に追記するMarkdown生成は、別ファイルの関数に任せる。
            const { renderUpdatedPrBody } = await import(`${process.env.GITHUB_WORKSPACE}/.github/scripts/render-pr-file-impact-summary.mjs`);

            // このWorkflowが動いているリポジトリとPR番号を取得する。
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            // PRの変更ファイル一覧をGitHub APIから全件取得する。
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            // 現在のPR本文と変更ファイル一覧から、更新後の本文を作る。
            const currentBody = context.payload.pull_request.body ?? "";
            const body = renderUpdatedPrBody({
              body: currentBody,
              files,
            });

            // すでに最新の本文なら、PR更新APIを呼ばずに終了する。
            if (body === currentBody) {
              core.info("PR body is already up to date.");
              return;
            }

            // 生成した本文でPR本文を更新する。
            await github.rest.pulls.update({
              owner,
              repo,
              pull_number,
              body,
            });
